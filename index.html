<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UnaKotse — Your First Car, Made Simple</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#11317F" />
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E1B33;
    --blue:#1A45C9;
    --blue-deep:#11317F;
    --amber:#F6A721;
    --amber-deep:#D98209;
    --bg:#EEF1F8;
    --card:#FFFFFF;
    --line:#E4E8F2;
    --muted:#5B6781;
    --text:#16203A;
    --good:#138A5E;
    --shadow:0 1px 2px rgba(14,27,51,.06), 0 8px 24px rgba(14,27,51,.08);
    --display:'Space Grotesk', sans-serif;
    --body:'Inter', sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:var(--body);
    background:radial-gradient(1200px 600px at 50% -10%, #DDE6FF 0%, transparent 60%), var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    display:flex; justify-content:center;
  }
  .app{
    width:100%; max-width:440px; min-height:100vh;
    background:var(--bg); position:relative; overflow-x:hidden;
    box-shadow:0 0 60px rgba(14,27,51,.10);
  }

  .topbar{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(135deg, var(--blue) 0%, var(--blue-deep) 100%);
    color:#fff; padding:18px 20px 22px; border-radius:0 0 22px 22px;
  }
  .brandrow{display:flex; align-items:center; gap:10px;}
  .logo-badge{
    width:34px; height:34px; border-radius:9px; background:var(--amber);
    display:grid; place-items:center; box-shadow:0 4px 10px rgba(217,130,9,.4);
  }
  .logo-badge svg{width:20px; height:20px;}
  .wordmark{font-family:var(--display); font-weight:700; font-size:19px; letter-spacing:-.4px;}
  .wordmark span{color:var(--amber);}
  .tagline{font-size:12.5px; opacity:.85; margin-top:8px; line-height:1.4; max-width:300px;}
  .search{
    margin-top:16px; display:flex; align-items:center; gap:9px;
    background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.22);
    border-radius:13px; padding:11px 13px;
  }
  .search svg{width:17px; height:17px; opacity:.85; flex-shrink:0;}
  .search input{
    background:transparent; border:none; outline:none;
    color:#fff; font-family:var(--body); font-size:14px; width:100%;
  }
  .search input::placeholder{color:rgba(255,255,255,.7);}
  .datasource{margin-top:10px; font-size:10.5px; opacity:.7; letter-spacing:.3px;}

  .screen{padding:18px 16px 90px; display:none;}
  .screen.active{display:block; animation:fade .25s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

  .eyebrow{font-family:var(--display); font-weight:600; font-size:11px; letter-spacing:1.4px; text-transform:uppercase; color:var(--muted);}
  .h-title{font-family:var(--display); font-weight:700; font-size:20px; letter-spacing:-.4px; margin-top:3px;}

  .budget{
    margin:14px 0 6px; background:var(--card); border:1px solid var(--line);
    border-radius:16px; padding:14px 15px; box-shadow:var(--shadow);
  }
  .budget-top{display:flex; justify-content:space-between; align-items:baseline;}
  .budget-label{font-size:12.5px; color:var(--muted); font-weight:500;}
  .budget-val{font-family:var(--display); font-weight:700; font-size:16px; color:var(--blue);}
  .budget input[type=range]{
    -webkit-appearance:none; appearance:none; width:100%; height:6px;
    border-radius:6px; margin-top:12px;
    background:linear-gradient(90deg, var(--blue), var(--amber));
  }
  .budget input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:22px; height:22px; border-radius:50%;
    background:#fff; border:3px solid var(--blue); cursor:pointer;
    box-shadow:0 2px 6px rgba(14,27,51,.25);
  }

  .chips{
    display:flex; gap:8px; overflow-x:auto; padding:12px 2px 4px;
    scrollbar-width:none;
  }
  .chips::-webkit-scrollbar{display:none;}
  .fchip{
    flex-shrink:0; border:1px solid var(--line); background:var(--card);
    color:var(--muted); font-family:var(--body); font-weight:600; font-size:12.5px;
    padding:8px 14px; border-radius:20px; cursor:pointer;
  }
  .fchip.on{background:var(--ink); color:#fff; border-color:var(--ink);}

  .brand-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px;}
  .brand-card{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:16px 14px; cursor:pointer; box-shadow:var(--shadow);
    transition:transform .12s ease;
  }
  .brand-card:active{transform:scale(.97);}
  .brand-mark{
    width:46px; height:46px; border-radius:12px; display:grid; place-items:center;
    font-family:var(--display); font-weight:700; font-size:19px; color:#fff;
  }
  .brand-name{font-family:var(--display); font-weight:600; font-size:15px; margin-top:11px;}
  .brand-meta{font-size:11.5px; color:var(--muted); margin-top:2px;}

  .backbtn{
    display:inline-flex; align-items:center; gap:6px; background:none; border:none;
    cursor:pointer; color:var(--blue); font-family:var(--body); font-weight:600;
    font-size:13.5px; padding:2px 0; margin-bottom:14px;
  }
  .backbtn svg{width:16px; height:16px;}

  .car-card{
    background:var(--card); border:1px solid var(--line); border-radius:18px;
    overflow:hidden; box-shadow:var(--shadow); cursor:pointer; margin-bottom:13px;
    transition:transform .12s ease;
  }
  .car-card:active{transform:scale(.985);}
  .car-photo{height:104px; display:grid; place-items:center; position:relative;}
  .car-photo svg{width:118px; opacity:.92;}
  .car-tag{
    position:absolute; top:10px; left:10px; background:rgba(255,255,255,.92);
    color:var(--ink); font-size:10.5px; font-weight:600; padding:4px 8px;
    border-radius:7px; letter-spacing:.3px;
  }
  .car-body{padding:13px 15px 15px;}
  .car-name{font-family:var(--display); font-weight:600; font-size:16px;}
  .car-trim{font-size:12px; color:var(--muted); margin-top:1px;}
  .car-foot{display:flex; justify-content:space-between; align-items:flex-end; margin-top:12px;}
  .srp-label{font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px;}
  .srp-val{font-family:var(--display); font-weight:700; font-size:18px; margin-top:1px;}
  .chiprow{display:flex; gap:6px;}
  .chip{
    font-size:11px; font-weight:600; color:var(--blue-deep);
    background:#E8EDFF; padding:5px 9px; border-radius:8px;
  }

  .detail-hero{
    border-radius:20px; height:170px; display:grid; place-items:center;
    position:relative; margin-bottom:16px; box-shadow:var(--shadow);
  }
  .detail-hero svg{width:200px;}
  .detail-name{font-family:var(--display); font-weight:700; font-size:23px; letter-spacing:-.5px;}
  .detail-trim{font-size:13px; color:var(--muted); margin-top:2px;}

  .advice{
    margin-top:14px; background:linear-gradient(135deg, #103A2C, #145C41);
    color:#EAF7F0; border-radius:16px; padding:15px 16px; box-shadow:var(--shadow);
  }
  .advice-h{
    font-family:var(--display); font-weight:600; font-size:12px;
    letter-spacing:1.2px; text-transform:uppercase; color:#8FD9B6;
    display:flex; align-items:center; gap:7px;
  }
  .advice-p{font-size:13.5px; line-height:1.55; margin-top:7px;}

  .avoid{
    margin-top:10px; background:#FFF3E0; border:1px solid #F1D6A3;
    border-radius:14px; padding:12px 14px;
  }
  .avoid-h{
    font-family:var(--display); font-weight:600; font-size:11px;
    letter-spacing:1.2px; text-transform:uppercase; color:#A8690B;
  }
  .avoid-p{font-size:13px; color:#7A5616; line-height:1.5; margin-top:5px;}

  .price-box{
    background:var(--ink); color:#fff; border-radius:18px;
    padding:17px 18px; margin:16px 0; box-shadow:var(--shadow); position:relative;
  }
  .price-box .srp-label{color:rgba(255,255,255,.65);}
  .price-big{font-family:var(--display); font-weight:700; font-size:30px; letter-spacing:-1px; margin-top:2px;}
  .verify-pill{
    display:inline-block; margin-top:9px; font-size:10.5px; font-weight:600;
    padding:4px 9px; border-radius:8px;
  }
  .verify-pill.warn{background:#5C4708; color:#FFD98A;}
  .verify-pill.ok{background:#0E4D36; color:#8FD9B6;}
  .monthly{
    margin-top:13px; padding-top:13px; border-top:1px solid rgba(255,255,255,.16);
    display:flex; justify-content:space-between; align-items:center;
  }
  .monthly-l{font-size:12px; color:rgba(255,255,255,.75);}
  .monthly-v{font-family:var(--display); font-weight:600; font-size:15px; color:var(--amber);}

  .sect-h{
    font-family:var(--display); font-weight:600; font-size:12px;
    letter-spacing:1.2px; text-transform:uppercase; color:var(--muted);
    margin:18px 0 10px;
  }

  .spec-grid{display:grid; grid-template-columns:1fr 1fr; gap:11px;}
  .spec{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:13px 14px; box-shadow:var(--shadow);
  }
  .spec-k{font-size:11px; color:var(--muted);}
  .spec-v{font-family:var(--display); font-weight:600; font-size:15px; margin-top:5px;}

  .safety{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:15px; box-shadow:var(--shadow);
  }
  .safety-top{display:flex; justify-content:space-between; align-items:center;}
  .safety-air{font-family:var(--display); font-weight:700; font-size:19px;}
  .safety-air small{font-family:var(--body); font-weight:500; font-size:12px; color:var(--muted);}
  .lvl{font-size:11px; font-weight:700; padding:5px 11px; border-radius:9px; letter-spacing:.4px;}
  .lvl.Basic{background:#F0F2F7; color:#5B6781;}
  .lvl.Good{background:#E8EDFF; color:#11317F;}
  .lvl.Advanced{background:#DFF5EA; color:#0E6B47;}
  .feat-list{margin-top:12px; display:grid; grid-template-columns:1fr 1fr; gap:7px 12px;}
  .feat{font-size:12px; color:var(--text); display:flex; align-items:center; gap:6px;}
  .feat b{font-weight:700; width:14px; text-align:center;}
  .feat.yes b{color:var(--good);}
  .feat.no{color:var(--muted);}
  .feat.no b{color:#C24141;}

  /* ---------- v5: buyer score ---------- */
  .score-box{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:15px; box-shadow:var(--shadow);}
  .score-head{display:flex; justify-content:space-between; align-items:center;}
  .score-big{font-family:var(--display); font-weight:700; font-size:26px;}
  .score-big small{font-size:13px; color:var(--muted); font-weight:500;}
  .score-note{font-size:12px; color:var(--muted); margin-top:10px; line-height:1.5;}
  .sbar{display:flex; align-items:center; gap:8px; margin-top:8px;}
  .sbar-l{font-size:11.5px; color:var(--muted); width:118px; flex-shrink:0;}
  .sbar-track{flex:1; height:7px; border-radius:5px; background:#EDF0F7; overflow:hidden;}
  .sbar-fill{display:block; height:100%; border-radius:5px; background:linear-gradient(90deg, var(--blue), var(--amber));}
  .sbar-v{font-size:11.5px; font-weight:700; width:26px; text-align:right;}

  /* ---------- v5: calculator ---------- */
  .calc{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:15px; box-shadow:var(--shadow);}
  .calc-row{margin-top:12px;}
  .calc-l{font-size:11.5px; color:var(--muted); margin-bottom:6px;}
  .seg{display:flex; gap:6px; flex-wrap:wrap;}
  .seg button{border:1px solid var(--line); background:#F4F6FB; color:var(--muted); font-family:var(--body); font-weight:600; font-size:12px; padding:7px 12px; border-radius:9px; cursor:pointer;}
  .seg button.on{background:var(--ink); color:#fff; border-color:var(--ink);}
  .calc input[type=number]{width:100%; border:1px solid var(--line); border-radius:10px; padding:9px 11px; font-family:var(--body); font-size:14px; outline:none; background:#F9FAFD;}
  .calc-out{margin-top:14px; background:#0E1B33; color:#fff; border-radius:13px; padding:13px 14px;}
  .co-row{display:flex; justify-content:space-between; font-size:12.5px; padding:3px 0; color:rgba(255,255,255,.8);}
  .co-row b{color:#fff; font-family:var(--display);}
  .co-big{display:flex; justify-content:space-between; align-items:baseline; border-top:1px solid rgba(255,255,255,.15); margin-top:8px; padding-top:9px;}
  .co-big span{font-size:12px; color:rgba(255,255,255,.75);}
  .co-big b{font-family:var(--display); font-size:18px; color:var(--amber);}
  .calc-note{font-size:10.5px; color:var(--muted); margin-top:9px; line-height:1.45;}

  /* ---------- v5: trims & rivals ---------- */
  .link-row{display:flex; justify-content:space-between; align-items:center; background:var(--card); border:1px solid var(--line); border-radius:13px; padding:12px 14px; box-shadow:var(--shadow); margin-bottom:9px; cursor:pointer;}
  .lr-name{font-size:13px; font-weight:600;}
  .lr-sub{font-size:11px; color:var(--muted); margin-top:1px;}
  .lr-price{font-family:var(--display); font-weight:700; font-size:13.5px; text-align:right;}
  .lr-diff{font-size:10.5px; font-weight:600; margin-top:1px; text-align:right;}
  .lr-diff.up{color:#C24141;}
  .lr-diff.down{color:var(--good);}

  /* ---------- v5: collapsibles & badges ---------- */
  details.acc{background:var(--card); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); margin-bottom:10px; overflow:hidden;}
  details.acc summary{cursor:pointer; list-style:none; padding:13px 15px; font-family:var(--display); font-weight:600; font-size:13.5px; display:flex; justify-content:space-between; align-items:center;}
  details.acc summary::-webkit-details-marker{display:none;}
  details.acc summary::after{content:"+"; color:var(--muted); font-size:17px;}
  details.acc[open] summary::after{content:"–";}
  .acc-body{padding:0 15px 13px; font-size:12.5px; color:var(--text); line-height:1.65;}
  .acc-body ul{margin-left:16px;}
  .badge-ncap{display:inline-block; margin-top:10px; font-size:11px; font-weight:700; background:#DFF5EA; color:#0E6B47; padding:5px 10px; border-radius:8px;}
  .fam-label{font-size:11px; font-weight:700; padding:5px 11px; border-radius:9px; background:#E8EDFF; color:#11317F;}

  /* ---------- v5: photo support ---------- */
  .car-photo{overflow:hidden;}
  .detail-hero{overflow:hidden;}
  .hero-img, .card-img{width:100%; height:100%; object-fit:cover; display:block;}

  .where{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:15px; box-shadow:var(--shadow); margin-bottom:14px;
  }
  .where-h{font-family:var(--display); font-weight:600; font-size:14px;}
  .where-p{font-size:13px; color:var(--muted); margin-top:7px; line-height:1.5;}
  .where-link{display:inline-block; margin-top:11px; color:var(--blue); font-weight:600; font-size:13px; text-decoration:none;}

  .tip{
    background:#FFF6E6; border:1px solid #F4DCA6; border-radius:14px;
    padding:13px 14px; font-size:12.5px; color:#7A5616; line-height:1.5;
  }
  .tip b{color:#5E410F;}
  .disclaimer{margin-top:18px; font-size:11px; color:var(--muted); line-height:1.5; text-align:center;}
  .empty{text-align:center; color:var(--muted); padding:40px 20px; font-size:14px; grid-column:1/3;}
</style>
</head>

<div class="app">

  <header class="topbar">
    <div class="brandrow">
      <div class="logo-badge">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 13l1.5-4.5A2 2 0 016.4 7h11.2a2 2 0 011.9 1.5L21 13v5a1 1 0 01-1 1h-1a1 1 0 01-1-1v-1H6v1a1 1 0 01-1 1H4a1 1 0 01-1-1v-5z" fill="#0E1B33"/><circle cx="7" cy="16" r="1.4" fill="#fff"/><circle cx="17" cy="16" r="1.4" fill="#fff"/></svg>
      </div>
      <div class="wordmark">Una<span>Kotse</span></div>
    </div>
    <p class="tagline">Your first car is a big step. Compare brands, prices, and specs in one place — built for first-time Filipino buyers.</p>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="searchInput" type="text" placeholder="Search a model, e.g. Vios, Xpander…" />
    </div>
    <div class="datasource" id="dataSource">Loading data…</div>
  </header>

  <section id="screen-home" class="screen active">
    <div class="budget">
      <div class="budget-top">
        <span class="budget-label">Show cars up to</span>
        <span class="budget-val" id="budgetVal">₱3,000,000</span>
      </div>
      <input type="range" id="budgetRange" min="600000" max="3000000" step="50000" value="3000000" />
    </div>

    <div class="chips" id="bodyChips"></div>

    <p class="eyebrow" style="margin-top:12px;">Browse by brand</p>
    <h2 class="h-title">Pick a brand to start</h2>
    <div class="brand-grid" id="brandGrid"></div>
  </section>

  <section id="screen-brand" class="screen">
    <button class="backbtn" onclick="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg>
      All brands
    </button>
    <p class="eyebrow" id="brandEyebrow">Brand</p>
    <h2 class="h-title" id="brandTitle">Models</h2>
    <div id="carList" style="margin-top:14px;"></div>
  </section>

  <section id="screen-car" class="screen">
    <button class="backbtn" id="carBack">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg>
      Back
    </button>
    <div id="carDetail"></div>
  </section>

</div>

<script>
/* ================================================================
   CONFIG — YOUR GOOGLE SHEET GOES HERE
   Import unakotse-data-template.csv into Google Sheets, then:
   File → Share → Publish to web → your tab → CSV → copy URL below.
   Leave empty ("") to use the built-in fallback database.
   ================================================================ */
const SHEET_CSV_URL = "";

const BRAND_COLORS = {
  "Toyota":"#E11B22","Mitsubishi":"#E60012","Honda":"#1A1A1A","Suzuki":"#0B57A4",
  "Nissan":"#C3002F","Ford":"#003478","Isuzu":"#C8102E","MG":"#B01F24",
  "Hyundai":"#002C5F","Kia":"#05141F"
};

/* ---------- CSV parsing ---------- */
function parseCSV(text){
  const rows = [];
  let row = [], cell = "", inQuotes = false;
  for(let i = 0; i < text.length; i++){
    const ch = text[i];
    if(inQuotes){
      if(ch === '"'){
        if(text[i+1] === '"'){ cell += '"'; i++; }
        else inQuotes = false;
      } else cell += ch;
    } else {
      if(ch === '"') inQuotes = true;
      else if(ch === ','){ row.push(cell); cell = ""; }
      else if(ch === '\n' || ch === '\r'){
        if(ch === '\r' && text[i+1] === '\n') i++;
        row.push(cell); cell = "";
        if(row.some(c => c.trim() !== "")) rows.push(row);
        row = [];
      }
      else cell += ch;
    }
  }
  row.push(cell);
  if(row.some(c => c.trim() !== "")) rows.push(row);
  return rows;
}

const yes = v => /^(yes|y|true|1)$/i.test(String(v).trim());

function sheetToBrands(rows){
  if(rows.length < 2) return null;
  const headers = rows[0].map(h => h.trim().toLowerCase());
  const idx = {}; headers.forEach((h,i) => idx[h] = i);
  const get = (r, name) => idx[name] !== undefined ? (r[idx[name]] || "").trim() : "";
  const num = (r, name) => { const v = parseFloat(String(get(r,name)).replace(/[^0-9.]/g,"")); return isNaN(v) ? 0 : v; };

  const map = new Map();
  for(let r = 1; r < rows.length; r++){
    const row = rows[r];
    const brand = get(row, "brand");
    if(!brand) continue;
    if(!map.has(brand)){
      map.set(brand, {
        name: brand,
        color: get(row, "brandcolor") || BRAND_COLORS[brand] || "#1A45C9",
        cars: []
      });
    }
    map.get(brand).cars.push({
      model: get(row,"model"), trim: get(row,"trim"),
      modelYear: get(row,"modelyear"), segment: get(row,"segment"),
      body: get(row,"body") || "Car",
      srp: num(row,"srp"),
      priceAsOf: get(row,"priceasofdate"),
      seats: num(row,"seats") || 5,
      clearanceMm: num(row,"clearancemm"),
      transmission: get(row,"transmission") || "—",
      fuel: get(row,"fuel") || "—",
      engine: get(row,"engine"),
      econCity: num(row,"fueleconcity"),
      econHwy: num(row,"fueleconhwy"),
      warrantyYears: num(row,"warrantyyears"),
      warrantyKm: num(row,"warrantykm"),
      airbags: num(row,"airbags"),
      sc: yes(get(row,"stabilitycontrol")),
      cam: yes(get(row,"reversecamera")),
      sensors: yes(get(row,"parkingsensors")),
      isofix: yes(get(row,"isofix")),
      carplay: yes(get(row,"applecarplay")),
      aauto: yes(get(row,"androidauto")),
      safetyLevel: get(row,"safetylevel") || "Basic",
      img: get(row,"imageurl"),
      ncap: get(row,"ncap"),
      bestFor: get(row,"bestfor"),
      avoidIf: get(row,"avoidif"),
      advice: get(row,"advice"),
      where: get(row,"where") || "Ask your nearest dealer.",
      link: get(row,"link") || "#"
    });
  }
  const brands = [...map.values()].filter(b => b.cars.length);
  return brands.length ? brands : null;
}

/* ---------- data loading ---------- */
let BRANDS = [];

function loadFallback(){
  const raw = document.getElementById("fallbackCSV").textContent;
  BRANDS = sheetToBrands(parseCSV(raw)) || [];
}

async function loadData(){
  if(!SHEET_CSV_URL){
    loadFallback();
    document.getElementById("dataSource").textContent =
      "Data: built-in sample (" + BRANDS.reduce((n,b)=>n+b.cars.length,0) + " cars) — connect your Google Sheet to go live";
    init(); return;
  }
  try{
    const res = await fetch(SHEET_CSV_URL);
    if(!res.ok) throw new Error("Sheet fetch failed: " + res.status);
    const parsed = sheetToBrands(parseCSV(await res.text()));
    if(parsed){
      BRANDS = parsed;
      document.getElementById("dataSource").textContent =
        "Data: live from your Google Sheet ✓ (" + BRANDS.reduce((n,b)=>n+b.cars.length,0) + " cars)";
    } else {
      loadFallback();
      document.getElementById("dataSource").textContent = "Sheet loaded but empty — using built-in sample";
    }
  } catch(err){
    console.error(err);
    loadFallback();
    document.getElementById("dataSource").textContent = "Couldn't reach your Sheet — showing built-in sample";
  }
  init();
}

/* ---------- helpers ---------- */
const peso = n => "₱" + n.toLocaleString("en-PH");
function monthlyEstimate(srp){
  const financed = srp * 0.80;
  const est = (financed * 1.45) / 60;
  return Math.round(est / 100) * 100;
}
function carSVG(color){
  return `<svg viewBox="0 0 200 90" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M18 62 L30 40 Q34 32 44 32 L120 32 Q132 32 140 40 L168 56 Q182 58 184 64 L184 70 L18 70 Z" fill="${color}"/>
    <path d="M48 36 L112 36 Q120 36 126 42 L138 54 L52 54 Q46 54 46 48 Z" fill="rgba(255,255,255,.35)"/>
    <circle cx="58" cy="70" r="13" fill="#1A2233"/><circle cx="58" cy="70" r="6" fill="#fff"/>
    <circle cx="150" cy="70" r="13" fill="#1A2233"/><circle cx="150" cy="70" r="6" fill="#fff"/>
  </svg>`;
}
const isUnverified = c => !c.priceAsOf || /sample/i.test(c.priceAsOf);

/* ---------- state ---------- */
let budgetCap = 3000000;
let bodyFilter = "All";
const BODY_TYPES = ["All","Hatchback","Sedan","SUV","MPV","Pickup"];

const matches = c => c.srp <= budgetCap && (bodyFilter === "All" || c.body === bodyFilter);

/* ---------- rendering ---------- */
function renderChips(){
  const wrap = document.getElementById("bodyChips");
  wrap.innerHTML = "";
  BODY_TYPES.forEach(t => {
    const b = document.createElement("button");
    b.className = "fchip" + (bodyFilter === t ? " on" : "");
    b.textContent = t;
    b.onclick = () => { bodyFilter = t; renderChips(); renderBrands(); };
    wrap.appendChild(b);
  });
}

function renderBrands(){
  const grid = document.getElementById("brandGrid");
  grid.innerHTML = "";
  let shown = 0;
  BRANDS.forEach((b, i) => {
    const hits = b.cars.filter(matches);
    if(!hits.length) return;
    shown++;
    const cheapest = Math.min(...hits.map(c => c.srp));
    const card = document.createElement("div");
    card.className = "brand-card";
    card.onclick = () => openBrand(i);
    card.innerHTML = `
      <div class="brand-mark" style="background:${b.color}">${b.name[0]}</div>
      <div class="brand-name">${b.name}</div>
      <div class="brand-meta">${hits.length} model${hits.length>1?"s":""} · from ${peso(cheapest)}</div>`;
    grid.appendChild(card);
  });
  if(!shown) grid.innerHTML = `<div class="empty">Nothing fits these filters yet. Try raising the budget or choosing another body type.</div>`;
}

function openBrand(i){
  const b = BRANDS[i];
  document.getElementById("brandEyebrow").textContent = b.name;
  document.getElementById("brandTitle").textContent = "Choose a model";
  const list = document.getElementById("carList");
  list.innerHTML = "";
  const cars = b.cars.filter(matches);
  if(!cars.length) list.innerHTML = `<div class="empty">No ${b.name} models fit your current filters.</div>`;
  cars.forEach(c => {
    const ci = b.cars.indexOf(c);
    const card = document.createElement("div");
    card.className = "car-card";
    card.onclick = () => openCar(i, ci);
    card.innerHTML = `
      <div class="car-photo" style="background:linear-gradient(135deg, ${b.color}1A, ${b.color}33)">
        <span class="car-tag" style="z-index:2">${c.body}</span>
        ${c.img ? `<img class="card-img" src="${c.img}" alt="">` : carSVG(b.color)}
      </div>
      <div class="car-body">
        <div class="car-name">${b.name} ${c.model}</div>
        <div class="car-trim">${c.trim}${c.segment ? " · " + c.segment : ""}</div>
        <div class="car-foot">
          <div>
            <div class="srp-label">SRP</div>
            <div class="srp-val">${peso(c.srp)}</div>
          </div>
          <div class="chiprow">
            ${c.econCity ? `<span class="chip">${c.econCity} km/L city</span>` : ""}
            <span class="chip">${c.seats}-seater</span>
          </div>
        </div>
      </div>`;
    list.appendChild(card);
  });
  showScreen("brand");
}

function feat(label, on){
  return `<div class="feat ${on ? "yes" : "no"}"><b>${on ? "✓" : "✕"}</b> ${label}</div>`;
}

/* ---------- derived buyer-guidance helpers ---------- */
const BRAND_VALUE = {
  "Toyota":["Strong","The resale benchmark — parts and buyers everywhere."],
  "Mitsubishi":["Strong","Huge service network; family models resell fast."],
  "Honda":["Strong","Loyal demand keeps used prices firm."],
  "Isuzu":["Strong","Legendary diesel durability; strong utility demand."],
  "Suzuki":["Average","Cheap parts and easy servicing; steady small-car demand."],
  "Nissan":["Average","Established network; used demand is moderate."],
  "Ford":["Average","Ranger and Everest hold value well; others are average."],
  "Hyundai":["Average","Long warranty helps; the used market is still growing."],
  "Kia":["Average","Long warranty helps; the used market is still growing."],
  "MG":["Newer brand","Aggressive value when new; used market still maturing."]
};
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
function parkingInfo(c){
  if(c.body === "Hatchback") return [9,"Easy to park"];
  if(c.body === "Sedan") return [7,"Easy to park"];
  if(c.body === "MPV") return [6,"Medium to park"];
  if(c.body === "Pickup") return [3,"Hard to park"];
  const seg = (c.segment || "").toLowerCase();
  if(c.body === "SUV") return (seg.includes("midsize") || seg.includes("3-row") || seg.includes("7-seat")) ? [4,"Hard to park"] : [6,"Medium to park"];
  return [6,"Medium to park"];
}
function beginnerScores(c, brandName){
  const budget = clamp(Math.round(10 - (c.srp - 600000) / 250000), 1, 10);
  const [park, parkLabel] = parkingInfo(c);
  let family = c.seats >= 7 ? 9 : (c.seats >= 5 ? 6 : 3);
  if(c.isofix && c.airbags >= 6) family = clamp(family + 1, 1, 10);
  const isEV = /electric/i.test(c.fuel);
  const fuelS = isEV ? 10 : clamp(Math.round((c.econCity || 10) / 2), 1, 10);
  const lvl = c.safetyLevel === "Advanced" ? 3 : (c.safetyLevel === "Good" ? 2 : 0);
  const safety = clamp((c.airbags || 2) + lvl + (c.sc ? 1 : 0), 1, 10);
  let maint = 8;
  if(/turbo/i.test(c.fuel) || /turbo/i.test(c.engine || "")) maint -= 1;
  if(/hybrid|electric/i.test(c.fuel)) maint -= 1;
  if(c.body === "Pickup" || /midsize/i.test(c.segment || "")) maint -= 1;
  if(brandName === "MG") maint -= 1;
  maint = clamp(maint, 1, 10);
  const overall = Math.round((budget + park + family + fuelS + safety + maint) / 6 * 10) / 10;
  return {budget, park, parkLabel, family, fuel: fuelS, safety, maint, overall};
}
function scoreNote(s){
  const parts = [["budget friendliness", s.budget],["parking ease", s.park],["family practicality", s.family],["fuel cost", s.fuel],["safety", s.safety],["upkeep cost", s.maint]];
  parts.sort((a,b) => b[1] - a[1]);
  return "Strongest on " + parts[0][0] + "; weakest on " + parts[parts.length-1][0] + ". Auto-computed from this car's specs — a guide, not a verdict.";
}
function famSafety(c){
  if(c.airbags >= 6 && c.safetyLevel === "Advanced") return "Excellent";
  if(c.airbags >= 6) return "Very good";
  if(c.airbags >= 4 || c.safetyLevel === "Good") return "Good";
  return "Basic";
}
const bar = (l, v) => `<div class="sbar"><span class="sbar-l">${l}</span><span class="sbar-track"><span class="sbar-fill" style="width:${v*10}%"></span></span><span class="sbar-v">${v}</span></div>`;

/* ---------- cost & financing calculator ---------- */
let CALC = {dp:0.2, years:5, rate:7, km:30, price:65, mode:"city", car:null};
function runCalc(){
  const c = CALC.car;
  const out = document.getElementById("calcOut");
  if(!c || !out) return;
  const financed = c.srp * (1 - CALC.dp);
  const interest = financed * (CALC.rate / 100) * CALC.years;
  const monthly = (financed + interest) / (CALC.years * 12);
  const down = c.srp * CALC.dp;
  const chattel = financed * 0.025;
  const ins1 = c.srp * 0.03;
  const fees = 20000;
  const cashOut = down + chattel + ins1 + fees + monthly;
  const isEV = /electric/i.test(c.fuel);
  let econ = c.econCity || 0;
  if(CALC.mode === "hwy") econ = c.econHwy || econ;
  if(CALC.mode === "mixed") econ = ((c.econCity || 0) + (c.econHwy || c.econCity || 0)) / 2;
  const fuelMo = (!isEV && econ) ? (CALC.km * 30 / econ) * CALC.price : 0;
  const maintMo = (c.body === "Pickup" || /midsize/i.test(c.segment || "")) ? 2500 : ((c.body === "SUV" || c.body === "MPV") ? 2000 : 1500);
  const trueMo = monthly + fuelMo + maintMo + ins1 / 12;
  out.innerHTML = `
    <div class="co-row"><span>Monthly amortization</span><b>${peso(Math.round(monthly))}</b></div>
    <div class="co-row"><span>Total interest over ${CALC.years} yrs</span><b>${peso(Math.round(interest))}</b></div>
    <div class="co-row"><span>Total paid over the loan</span><b>${peso(Math.round(down + financed + interest))}</b></div>
    <div class="co-row"><span>Down + chattel + insurance + LTO/fees + 1st month</span><b></b></div>
    <div class="co-big"><span>Est. cash-out before release</span><b>${peso(Math.round(cashOut))}</b></div>
    <div class="co-row" style="margin-top:9px"><span>${isEV ? "Fuel — EV: budget charging instead" : "Fuel (" + CALC.km + " km/day, " + CALC.mode + ")"}</span><b>${isEV ? "—" : peso(Math.round(fuelMo)) + "/mo"}</b></div>
    <div class="co-row"><span>Maintenance + insurance set-aside</span><b>~${peso(Math.round(maintMo + ins1/12))}/mo</b></div>
    <div class="co-big"><span>Real monthly cost estimate</span><b>~${peso(Math.round(trueMo))}/mo</b></div>
    <div class="co-row" style="margin-top:9px"><span>Comfortable household income</span><b>${peso(Math.round(monthly*4/1000)*1000)}–${peso(Math.round(monthly*5/1000)*1000)}/mo</b></div>`;
}
function setSeg(g, btn){
  document.querySelectorAll("[data-" + g + "]").forEach(x => x.classList.remove("on"));
  btn.classList.add("on");
}
function wireCalc(c){
  CALC = {dp:0.2, years:5, rate:7, km:30, price:/diesel/i.test(c.fuel) ? 62 : 65, mode:"city", car:c};
  document.querySelectorAll("[data-dp]").forEach(b => b.onclick = () => {CALC.dp = +b.dataset.dp; setSeg("dp", b); runCalc();});
  document.querySelectorAll("[data-yr]").forEach(b => b.onclick = () => {CALC.years = +b.dataset.yr; setSeg("yr", b); runCalc();});
  document.querySelectorAll("[data-md]").forEach(b => b.onclick = () => {CALC.mode = b.dataset.md; setSeg("md", b); runCalc();});
  const r = document.getElementById("rateIn"), k = document.getElementById("kmIn"), p = document.getElementById("priceIn");
  if(r) r.oninput = () => {CALC.rate = +r.value || 7; runCalc();};
  if(k) k.oninput = () => {CALC.km = +k.value || 0; runCalc();};
  if(p) p.oninput = () => {CALC.price = +p.value || 0; runCalc();};
  runCalc();
}

function openCar(bi, ci){
  const b = BRANDS[bi];
  const c = b.cars[ci];
  document.getElementById("carBack").onclick = () => openBrand(bi);
  const unv = isUnverified(c);
  const s = beginnerScores(c, b.name);
  const fam = famSafety(c);
  const [resTag, resNote] = BRAND_VALUE[b.name] || ["Average","Ask owners' groups about local resale."];

  /* other trims of this same model */
  const siblings = b.cars.map((x, xi) => ({x, xi})).filter(o => o.x.model === c.model && o.xi !== ci);
  const sibHTML = siblings.length ? `<div class="sect-h">Other ${c.model} trims</div>` + siblings.map(o => {
    const d = o.x.srp - c.srp;
    return `<div class="link-row" onclick="openCar(${bi},${o.xi})">
      <div><div class="lr-name">${o.x.trim}</div><div class="lr-sub">${o.x.airbags} airbags · ${o.x.transmission}</div></div>
      <div><div class="lr-price">${peso(o.x.srp)}</div><div class="lr-diff ${d >= 0 ? "up" : "down"}">${d >= 0 ? "+₱" : "−₱"}${Math.abs(d).toLocaleString("en-PH")} vs this</div></div>
    </div>`;
  }).join("") : "";

  /* cross-brand rivals: same body type, within ~22% of price */
  let rivals = [];
  BRANDS.forEach((bb, bbi) => bb.cars.forEach((cc, cci) => {
    if(bbi === bi && cc.model === c.model) return;
    if(cc.body !== c.body) return;
    const diff = Math.abs(cc.srp - c.srp) / c.srp;
    if(diff <= 0.22) rivals.push({bb, bbi, cc, cci, diff});
  }));
  rivals.sort((a, b2) => a.diff - b2.diff);
  const seen = new Set(); const top = [];
  for(const r of rivals){
    const key = r.bb.name + " " + r.cc.model;
    if(seen.has(key)) continue;
    seen.add(key); top.push(r);
    if(top.length >= 4) break;
  }
  const rivalHTML = top.length ? `<div class="sect-h">Also compare with</div>` + top.map(r =>
    `<div class="link-row" onclick="openCar(${r.bbi},${r.cci})">
      <div><div class="lr-name">${r.bb.name} ${r.cc.model}</div><div class="lr-sub">${r.cc.trim} · ${r.cc.seats} seats · ${r.cc.airbags} airbags</div></div>
      <div><div class="lr-price">${peso(r.cc.srp)}</div><div class="lr-diff ${r.cc.srp >= c.srp ? "up" : "down"}">${r.cc.srp >= c.srp ? "+₱" : "−₱"}${Math.abs(r.cc.srp - c.srp).toLocaleString("en-PH")}</div></div>
    </div>`).join("") : "";

  document.getElementById("carDetail").innerHTML = `
    <div class="detail-hero" style="background:linear-gradient(135deg, ${b.color}22, ${b.color}40)">
      <span class="car-tag" style="position:absolute; top:12px; left:12px; z-index:2;">${c.body}${c.modelYear ? " · " + c.modelYear : ""}</span>
      ${c.img ? `<img class="hero-img" src="${c.img}" alt="${b.name} ${c.model}">` : carSVG(b.color)}
    </div>
    <div class="detail-name">${b.name} ${c.model}</div>
    <div class="detail-trim">${c.trim}${c.segment ? " · " + c.segment : ""}</div>

    ${c.advice ? `<div class="advice"><div class="advice-h">✓ Is this for you?</div><p class="advice-p">${c.advice}</p></div>` : ""}
    ${c.avoidIf ? `<div class="avoid"><div class="avoid-h">Think twice if…</div><p class="avoid-p">${c.avoidIf}</p></div>` : ""}

    <div class="price-box">
      <div class="srp-label">Suggested Retail Price</div>
      <div class="price-big">${peso(c.srp)}</div>
      ${unv ? `<span class="verify-pill warn">⚠ Sample data — confirm with dealer</span>` : `<span class="verify-pill ok">✓ Price as of ${c.priceAsOf}</span>`}
      <div class="monthly">
        <span class="monthly-l">Rough monthly (20% down, 5 yrs)</span>
        <span class="monthly-v">~${peso(monthlyEstimate(c.srp))}/mo</span>
      </div>
    </div>

    <div class="sect-h">First-time buyer score</div>
    <div class="score-box">
      <div class="score-head">
        <div class="score-big">${s.overall}<small> / 10 overall</small></div>
        <span class="fam-label">${s.parkLabel}</span>
      </div>
      ${bar("Budget friendliness", s.budget)}
      ${bar("Parking ease", s.park)}
      ${bar("Family practicality", s.family)}
      ${bar("Fuel cost", s.fuel)}
      ${bar("Safety", s.safety)}
      ${bar("Upkeep cost", s.maint)}
      <p class="score-note">${scoreNote(s)}</p>
    </div>

    <div class="sect-h">Key specs</div>
    <div class="spec-grid">
      <div class="spec"><div class="spec-k">Seating</div><div class="spec-v">${c.seats} seats</div></div>
      <div class="spec"><div class="spec-k">Ground clearance</div><div class="spec-v">${c.clearanceMm ? c.clearanceMm + " mm" : "—"}</div></div>
      <div class="spec"><div class="spec-k">Transmission</div><div class="spec-v">${c.transmission}</div></div>
      <div class="spec"><div class="spec-k">Fuel</div><div class="spec-v">${c.fuel}</div></div>
      ${c.engine ? `<div class="spec"><div class="spec-k">Engine</div><div class="spec-v">${c.engine}</div></div>` : ""}
      ${c.econCity ? `<div class="spec"><div class="spec-k">Fuel economy (est.)</div><div class="spec-v">${c.econCity} city / ${c.econHwy || "—"} hwy km/L</div></div>` : ""}
    </div>

    <div class="sect-h">Safety</div>
    <div class="safety">
      <div class="safety-top">
        <div class="safety-air">${c.airbags || "—"} <small>airbags</small></div>
        <span class="lvl ${c.safetyLevel}">${c.safetyLevel.toUpperCase()}</span>
      </div>
      <div class="feat-list">
        ${feat("Stability control", c.sc)}
        ${feat("Reverse camera", c.cam)}
        ${feat("Parking sensors", c.sensors)}
        ${feat("ISOFIX child anchors", c.isofix)}
        ${feat("Apple CarPlay", c.carplay)}
        ${feat("Android Auto", c.aauto)}
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:12px;">
        <span class="spec-k">Family safety</span>
        <span class="fam-label">${fam}</span>
      </div>
      ${c.ncap ? `<span class="badge-ncap">★ ${c.ncap}</span>` : ""}
    </div>

    <div class="sect-h">Cost & financing calculator</div>
    <div class="calc">
      <div class="calc-l">Down payment</div>
      <div class="seg">
        <button data-dp="0.2" class="on">20%</button><button data-dp="0.3">30%</button><button data-dp="0.4">40%</button><button data-dp="0.5">50%</button>
      </div>
      <div class="calc-row"><div class="calc-l">Loan term</div>
        <div class="seg"><button data-yr="3">3 yrs</button><button data-yr="4">4 yrs</button><button data-yr="5" class="on">5 yrs</button></div>
      </div>
      <div class="calc-row"><div class="calc-l">Bank add-on rate, % per year (typical 5–8%)</div>
        <input id="rateIn" type="number" value="7" min="3" max="15" step="0.5">
      </div>
      <div class="calc-row"><div class="calc-l">Km per day · Fuel price per liter</div>
        <div style="display:flex; gap:8px;">
          <input id="kmIn" type="number" value="30" min="0">
          <input id="priceIn" type="number" value="${/diesel/i.test(c.fuel) ? 62 : 65}" min="0">
        </div>
      </div>
      <div class="calc-row"><div class="calc-l">Driving mix</div>
        <div class="seg"><button data-md="city" class="on">City</button><button data-md="mixed">Mixed</button><button data-md="hwy">Highway</button></div>
      </div>
      <div class="calc-out" id="calcOut"></div>
      <p class="calc-note">Estimates only. Uses typical figures: chattel mortgage ~2.5% of the loan, first-year comprehensive insurance ~3% of SRP, ₱20,000 LTO/processing, and a monthly maintenance set-aside. Banks and dealers compute differently — always request the official computation sheet in writing.</p>
    </div>

    ${sibHTML}
    ${rivalHTML}

    ${c.warrantyYears ? `
    <div class="sect-h">Warranty</div>
    <div class="spec"><div class="spec-k">Factory warranty</div>
      <div class="spec-v">${c.warrantyYears} years / ${c.warrantyKm ? c.warrantyKm.toLocaleString("en-PH") + " km" : "—"}</div>
    </div>` : ""}

    <div class="sect-h">Long-term value</div>
    <div class="score-box">
      <div class="score-head"><span class="lr-name">Brand resale reputation</span><span class="fam-label">${resTag}</span></div>
      <p class="score-note">${resNote} This reflects general brand reputation only — actual resale depends on condition, mileage, and timing.</p>
    </div>

    <div class="sect-h">Before you sign anything</div>
    <details class="acc"><summary>Ask the dealer these questions</summary><div class="acc-body"><ul>
      <li>Is this the latest SRP — in writing?</li>
      <li>Is insurance included? Which coverage?</li>
      <li>Is LTO registration included?</li>
      <li>Is the chattel mortgage fee included?</li>
      <li>What is the exact total cash-out?</li>
      <li>What is the exact monthly amortization?</li>
      <li>Any dealer discounts or freebies?</li>
      <li>Is the unit available now, and in what colors?</li>
      <li>How long is the waiting time?</li>
      <li>How long is this quote valid?</li>
    </ul></div></details>
    <details class="acc"><summary>Documents you'll need</summary><div class="acc-body">
      <b>If financing:</b><ul>
      <li>2 valid government IDs</li>
      <li>Proof of billing</li>
      <li>Certificate of employment + latest payslips</li>
      <li>Latest ITR or bank statements</li>
      <li>DTI/business permit if self-employed</li></ul>
      <b style="display:block; margin-top:8px;">If paying cash:</b><ul>
      <li>2 valid IDs and proof of payment</li></ul>
    </div></details>

    <div class="sect-h">Where to buy</div>
    <div class="where">
      <div class="where-h">📍 Availability</div>
      <div class="where-p">${c.where}</div>
      <a class="where-link" href="${c.link}" target="_blank" rel="noopener">Visit official site →</a>
    </div>

    <div class="tip">
      <b>First-timer tip:</b> The SRP isn't the final cost. Use the calculator above, then ask the dealer for the full "all-in" or "total cash out" computation and compare.
    </div>

    <p class="disclaimer">Specs, prices, scores, and estimates shown may be sample data or out of date — always confirm with an official dealer before deciding. Scores are computed automatically from listed specs. Calculator figures are illustrative only and not a loan offer.</p>
  `;
  wireCalc(c);
  showScreen("car");
  window.scrollTo(0, 0);
}

/* ---------- navigation & controls ---------- */
function showScreen(name){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen-" + name).classList.add("active");
}
function goHome(){ showScreen("home"); window.scrollTo(0,0); }

document.getElementById("budgetRange").addEventListener("input", e => {
  budgetCap = +e.target.value;
  document.getElementById("budgetVal").textContent = peso(budgetCap);
  renderBrands();
});

document.getElementById("searchInput").addEventListener("input", e => {
  const q = e.target.value.trim().toLowerCase();
  if(!q){ goHome(); renderBrands(); return; }
  for(let i = 0; i < BRANDS.length; i++){
    const match = BRANDS[i].cars.find(c => (BRANDS[i].name + " " + c.model + " " + c.trim).toLowerCase().includes(q));
    if(match){ openBrand(i); return; }
  }
});

function init(){ renderChips(); renderBrands(); }
loadData();

/* ---------- PWA: service worker for installability + offline ---------- */
if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(err => console.log("SW registration skipped:", err));
  });
}
</script>
</body>
</html>
